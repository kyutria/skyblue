<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iframe 파라미터 테스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #a8d8ea;
      font-family: 'Malgun Gothic', sans-serif;
      color: #333;
    }
    .box {
      text-align: center;
      background: white;
      padding: 40px 60px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .label { font-size: 14px; color: #888; margin-bottom: 8px; }
    .stage { font-size: 48px; font-weight: bold; color: #5b9bd5; }
    .message { margin-top: 16px; font-size: 16px; color: #555; }
    .url { margin-top: 24px; font-size: 12px; color: #aaa; word-break: break-all; }
  </style>
</head>
<body>
  <div class="box">
    <div class="label">현재 스테이지</div>
    <div class="stage" id="stageNum">-</div>
    <div class="message" id="message">파라미터를 읽는 중...</div>
    <div class="url" id="urlDisplay"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const stage = params.get('stage');

    document.getElementById('urlDisplay').textContent = '현재 URL: ' + window.location.href;

    if (stage) {
      document.getElementById('stageNum').textContent = stage;
      document.getElementById('message').textContent = '파라미터 전달 성공!';
    } else {
      document.getElementById('stageNum').textContent = '?';
      document.getElementById('message').textContent = '?stage=숫자 를 URL에 붙여서 테스트해보세요.';
    }
  </script>
</body>
</html>
