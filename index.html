<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>너는 하늘색이 좋다고 말했다</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">
    <button id="bgm-mute"></button>
    <div id="story-phase" class="phase">
      <img id="story-image" src="" alt="">
      <div id="text-box">
        <p id="story-text"></p>
        <div id="hint">▼</div>
      </div>
    </div>
    <div id="puzzle-phase" class="phase">
      <img id="puzzle-image" src="" alt="">
      <div id="puzzle-overlay"></div>
      <canvas id="draw-canvas"></canvas>
      <div id="draw-toolbar">
        <div id="draw-handle"></div>
        <div class="draw-row">
          <button id="tool-pen" class="draw-tool-btn active">✏️</button>
          <button id="tool-eraser" class="draw-tool-btn">🧽</button>
          <button id="tool-text" class="draw-tool-btn draw-tool-text-btn">A</button>
          <button id="draw-undo" class="draw-tool-btn">↩</button>
          <button id="draw-redo" class="draw-tool-btn">↪</button>
          <button id="draw-clear" class="draw-tool-btn">✕</button>
          <div class="draw-sep"></div>
          <button class="draw-size-btn" data-size="3"><span class="draw-dot draw-dot-xs"></span></button>
          <button class="draw-size-btn active" data-size="6"><span class="draw-dot draw-dot-s"></span></button>
          <button class="draw-size-btn" data-size="12"><span class="draw-dot draw-dot-m"></span></button>
          <button class="draw-size-btn" data-size="20"><span class="draw-dot draw-dot-l"></span></button>
        </div>
        <div class="draw-row">
          <button class="draw-color-btn active" data-color="#1a1a1a" style="background:#1a1a1a"></button>
          <button class="draw-color-btn" data-color="#ffffff" style="background:#ffffff"></button>
          <button class="draw-color-btn" data-color="#e63946" style="background:#e63946"></button>
          <button class="draw-color-btn" data-color="#f4a261" style="background:#f4a261"></button>
          <button class="draw-color-btn" data-color="#ffd166" style="background:#ffd166"></button>
          <button class="draw-color-btn" data-color="#2dc653" style="background:#2dc653"></button>
          <button class="draw-color-btn" data-color="#4361ee" style="background:#4361ee"></button>
          <button class="draw-color-btn" data-color="#7209b7" style="background:#7209b7"></button>
          <div class="draw-sep"></div>
          <button id="draw-close" class="draw-tool-btn">닫기</button>
        </div>
      </div>
      <button id="draw-toggle">그리기</button>
      <div id="draw-text-wrap">
        <input id="draw-text-input" type="text" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>
  <audio id="bgm" loop></audio>
  <script src="stages.js"></script>
  <script src="game.js"></script>
</body>
</html>
